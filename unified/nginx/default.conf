map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream frontend {
    server spa:5173 max_fails=1 fail_timeout=1s;
    server spa:5173 max_fails=1 fail_timeout=1s;
}

upstream backend {
    server api:5174 max_fails=1 fail_timeout=1s;
    server api:5174 max_fails=1 fail_timeout=1s;
}

server {
    listen 80;
    listen [::]:80;
    server_name thursday;
    
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    
        client_max_body_size 0;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_pass http://frontend;
        proxy_connect_timeout 1s;
    }

    location /api/ {
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $remote_addr;

        client_max_body_size 0;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_connect_timeout 1s;

        proxy_set_header Cookie $http_cookie;
        proxy_set_header Set-Cookie $http_set_cookie;

        location /api/apispec_1.json {
            rewrite ^/api(/apispec_1\.json)$ /api$1 break;
            proxy_pass http://backend;
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
        }
    }
}